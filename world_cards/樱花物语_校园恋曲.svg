<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 600 840" width="600" height="840">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="40%" stop-color="#ffeef2"/>
      <stop offset="100%" stop-color="#fce4ec"/>
    </linearGradient>
    <linearGradient id="sakuraGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="50%" stop-color="#f8bbd0"/>
      <stop offset="100%" stop-color="#f48fb1"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="50%" stop-color="#e91e63"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#e91e63" flood-opacity="0.15"/>
    </filter>
    <filter id="petalBlur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- 卡片背景 -->
  <rect x="10" y="10" width="580" height="820" rx="16" fill="url(#bgGrad)" stroke="url(#sakuraGrad)" stroke-width="2" filter="url(#softShadow)"/>

  <!-- 天空渐变装饰 -->
  <rect x="11" y="11" width="578" height="300" rx="15" fill="url(#skyGrad)"/>

  <!-- 内边框装饰 -->
  <rect x="20" y="20" width="560" height="800" rx="12" fill="none" stroke="#f48fb144" stroke-width="1"/>

  <!-- 飘落的樱花花瓣装饰 -->
  <g opacity="0.3" filter="url(#petalBlur)">
    <ellipse cx="80" cy="120" rx="6" ry="4" fill="#f8bbd0" transform="rotate(-30 80 120)"/>
    <ellipse cx="520" cy="90" rx="5" ry="3" fill="#f48fb1" transform="rotate(20 520 90)"/>
    <ellipse cx="150" cy="200" rx="4" ry="3" fill="#fce4ec" transform="rotate(-45 150 200)"/>
    <ellipse cx="460" cy="180" rx="5" ry="3" fill="#f8bbd0" transform="rotate(35 460 180)"/>
    <ellipse cx="100" cy="300" rx="4" ry="3" fill="#f48fb1" transform="rotate(-20 100 300)"/>
    <ellipse cx="500" cy="280" rx="5" ry="3" fill="#fce4ec" transform="rotate(25 500 280)"/>
    <ellipse cx="200" cy="50" rx="4" ry="3" fill="#f8bbd0" transform="rotate(-15 200 50)"/>
    <ellipse cx="400" cy="40" rx="5" ry="3" fill="#f48fb1" transform="rotate(40 400 40)"/>
  </g>

  <!-- 顶部装饰线 -->
  <line x1="60" y1="60" x2="540" y2="60" stroke="url(#sakuraGrad)" stroke-width="1" opacity="0.5"/>
  <text x="300" y="63" text-anchor="middle" fill="#f48fb1" font-size="10" opacity="0.6">✿</text>
  <circle cx="60" cy="60" r="2" fill="#f48fb1" opacity="0.4"/>
  <circle cx="540" cy="60" r="2" fill="#f48fb1" opacity="0.4"/>

  <!-- 类型标签 -->
  <rect x="240" y="75" width="120" height="28" rx="14" fill="#e91e6312" stroke="#e91e6344" stroke-width="1"/>
  <text x="300" y="94" text-anchor="middle" fill="#c2185b" font-family="sans-serif" font-size="13" letter-spacing="4">校 园</text>

  <!-- 图标 -->
  <text x="300" y="155" text-anchor="middle" font-size="56">🌸</text>

  <!-- 世界名称 -->
  <text x="300" y="195" text-anchor="middle" fill="url(#titleGrad)" font-family="sans-serif" font-size="28" font-weight="bold" letter-spacing="2">星海学院</text>
  <text x="300" y="222" text-anchor="middle" fill="#c2185b" font-family="sans-serif" font-size="16" letter-spacing="6" opacity="0.8">校 园 恋 曲</text>

  <!-- 分隔线 -->
  <line x1="100" y1="242" x2="500" y2="242" stroke="url(#sakuraGrad)" stroke-width="0.5" opacity="0.4"/>
  <text x="300" y="246" text-anchor="middle" fill="#f48fb1" font-size="10" opacity="0.5">♥</text>

  <!-- 世界描述 -->
  <text x="300" y="272" text-anchor="middle" fill="#ad1457" font-family="sans-serif" font-size="11" opacity="0.85">在樱花飘落的校园里，邂逅命中注定的那个人</text>

  <!-- 世界详情区域 -->
  <text x="50" y="310" fill="#c2185b" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="2">✿ 学院概览</text>
  <line x1="50" y1="318" x2="180" y2="318" stroke="#f48fb133" stroke-width="0.5"/>

  <text x="50" y="340" fill="#880e4f" font-family="sans-serif" font-size="10.5" opacity="0.8">
    <tspan x="50" dy="0">星海学院坐落在临海的山丘之上，是一所拥有百年</tspan>
    <tspan x="50" dy="16">历史的私立高中。校园里种满了樱花树，每到春天，</tspan>
    <tspan x="50" dy="16">粉白的花瓣如雪般飘落，铺满通往教学楼的林荫道，</tspan>
    <tspan x="50" dy="16">被学生们称为「樱花大道」。你是今年刚转入的</tspan>
    <tspan x="50" dy="16">转学生，一段关于青春与恋爱的故事即将开始……</tspan>
  </text>

  <!-- 校园地点 -->
  <text x="50" y="460" fill="#c2185b" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="2">✿ 校园地点</text>
  <line x1="50" y1="468" x2="180" y2="468" stroke="#f48fb133" stroke-width="0.5"/>

  <rect x="50" y="480" width="240" height="52" rx="6" fill="#e91e6308" stroke="#f48fb118" stroke-width="0.5"/>
  <text x="66" y="500" fill="#c2185b" font-size="12">🏫 凌云楼</text>
  <text x="66" y="518" fill="#880e4f" font-size="9.5" opacity="0.7">主教学楼·普通科与特进科</text>

  <rect x="310" y="480" width="240" height="52" rx="6" fill="#e91e6308" stroke="#f48fb118" stroke-width="0.5"/>
  <text x="326" y="500" fill="#c2185b" font-size="12">📚 知光馆</text>
  <text x="326" y="518" fill="#880e4f" font-size="9.5" opacity="0.7">图书馆·安静的学习圣地</text>

  <rect x="50" y="542" width="240" height="52" rx="6" fill="#e91e6308" stroke="#f48fb118" stroke-width="0.5"/>
  <text x="66" y="562" fill="#c2185b" font-size="12">🏟️ 风雷馆</text>
  <text x="66" y="580" fill="#880e4f" font-size="9.5" opacity="0.7">体育馆·篮球社飞鹰队主场</text>

  <rect x="310" y="542" width="240" height="52" rx="6" fill="#e91e6308" stroke="#f48fb118" stroke-width="0.5"/>
  <text x="326" y="562" fill="#c2185b" font-size="12">🔔 许愿钟楼</text>
  <text x="326" y="580" fill="#880e4f" font-size="9.5" opacity="0.7">校园最高处·传说能实现心愿</text>

  <!-- 社团活动 -->
  <text x="50" y="618" fill="#c2185b" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="2">✿ 社团活动</text>
  <line x1="50" y1="626" x2="180" y2="626" stroke="#f48fb133" stroke-width="0.5"/>

  <text fill="#880e4f" font-family="sans-serif" font-size="10" opacity="0.8">
    <tspan x="50" y="646">📝纸鸢社</tspan>
    <tspan x="150" y="646">🎵回声社</tspan>
    <tspan x="250" y="646">🏀飞鹰队</tspan>
    <tspan x="350" y="646">🔭天文社</tspan>
    <tspan x="450" y="646">🎨美术社</tspan>
  </text>

  <!-- 起始信息 -->
  <text x="50" y="680" fill="#c2185b" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="2">✿ 故事起点</text>
  <line x1="50" y1="688" x2="180" y2="688" stroke="#f48fb133" stroke-width="0.5"/>

  <text x="50" y="708" fill="#ad1457" font-family="sans-serif" font-size="11">📍 星海学院 · 正门</text>
  <text x="50" y="728" fill="#880e4f" font-family="sans-serif" font-size="9.5" opacity="0.7">樱花飘落的四月清晨，转学生第一天入学</text>

  <!-- 底部信息栏 -->
  <line x1="60" y1="752" x2="540" y2="752" stroke="url(#sakuraGrad)" stroke-width="0.5" opacity="0.3"/>

  <text x="50" y="774" fill="#880e4f" font-family="sans-serif" font-size="9.5" opacity="0.7">
    <tspan>💕 好感度系统</tspan>
    <tspan x="170">📅 日程推进</tspan>
    <tspan x="290">🎒 4件初始物品</tspan>
    <tspan x="440">💰 500元</tspan>
  </text>

  <!-- 底部品牌 -->
  <text x="300" y="806" text-anchor="middle" fill="#e91e63" font-family="sans-serif" font-size="11" opacity="0.35" letter-spacing="3">心 隅 · XINYU</text>

  <!-- ====== 嵌入的世界数据（供导入使用） ====== -->
  <script type="application/json" id="xinyu-world-data">{"name":"樱花物语：校园恋曲","genre":"现代","icon":"🌸","description":"在樱花飘落的校园里，邂逅命中注定的那个人","world":{"name":"星海学院","genre":"现代","description":"星海学院坐落在临海的山丘之上，是一所拥有百年历史的综合性私立高中。校园里种满了樱花树，每到春天，粉白色的花瓣如雪般飘落，铺满通往教学楼的林荫道，因此被学生们称为「樱花大道」。\n\n学院分为普通科和特进科，特进科汇聚了来自全国各地的优秀学生。校园主要建筑包括：主教学楼「凌云楼」、图书馆「知光馆」、体育馆「风雷馆」、学生食堂「百味堂」、以及建在校园最高处的钟楼——据说在钟楼下许愿，就能和喜欢的人永远在一起。\n\n学校有丰富的社团活动，其中最引人注目的是：文学社「纸鸢社」、音乐社「回声社」、篮球社「飞鹰队」、以及神秘的「天文观测社」。每年秋天举办的「星海祭」文化祭是全校最大的活动，各社团都会精心准备展览和表演。\n\n你是今年刚转入星海学院的转学生。在新环境里，你将遇到形形色色的人——温柔的学姐、傲娇的同桌、阳光的篮球少年、安静的图书委员……一段关于青春、友情和恋爱的故事，即将在这个春天拉开序幕。","rules":"【社交系统】\n- 好感度系统：与每个角色有独立的好感度（0-100），通过互动、送礼、共同事件提升\n- 好感度阶段：陌生→认识→朋友→亲密→暧昧→告白（可成功或失败）\n- 每个角色有独特的喜好和性格，不同行为会产生不同的好感度变化\n\n【日程系统】\n- 游戏按「天」推进，每天分为：早晨→上午课程→午休→下午课程→放学后→晚间\n- 不同时间段可以触发不同的事件和遇到不同的人\n- 放学后可以参加社团活动、外出约会、或独自探索\n\n【属性系统】\n- 学力：影响学习成绩和考试事件\n- 魅力：影响社交互动和好感度增长\n- 体力：参加运动和社团活动消耗体力\n- 创意：影响文化祭准备和特殊事件\n\n【特殊事件】\n- 季节事件：春之入学、夏之祭典、秋之星海祭、冬之圣诞\n- 个人线事件：每个可攻略角色有独立的剧情线\n- 随机事件：偶遇、突发事件、考试周等","tone":"轻松","customPrompt":"1. 整体氛围要温馨、青春、有恋爱感，多用细腻的心理描写和环境烘托\n2. 对话要自然生动，符合高中生说话方式，适当加入校园流行语\n3. 每个NPC都要有鲜明的性格特征和说话风格，不要脸谱化\n4. 恋爱发展要循序渐进，不要急于推进关系\n5. 多描写日常细节：教室的光影、食堂的饭菜、放学后的夕阳、雨天的屋檐\n6. 适当加入青春期的烦恼和成长元素\n7. 不要出现任何成人内容，保持纯爱风格\n8. 季节和天气变化要融入叙事，增强沉浸感\n9. 让玩家的每个选择都有意义，影响人际关系和剧情走向\n10. 偶尔加入一些幽默和轻松的日常互动，不要一直沉重"},"starterItems":[{"name":"学生手册","type":"misc","description":"星海学院的学生手册，记录了校规、社团介绍和校园地图","quantity":1,"effects":{},"rarity":"common"},{"name":"手机","type":"misc","description":"一部普通的智能手机，通讯录里只有父母的号码","quantity":1,"effects":{},"rarity":"common"},{"name":"便当","type":"consumable","description":"妈妈早上准备的便当，吃了能恢复体力","quantity":3,"effects":{"hp":20},"rarity":"common"},{"name":"转学通知书","type":"quest","description":"星海学院的入学通知书，上面写着你的班级：二年A班","quantity":1,"effects":{},"rarity":"uncommon"}],"starterLocation":"星海学院·正门","starterLocationDesc":"星海学院的标志性入口，一座巨大的石制拱门式校门。门楣上刻着「星海学院」四个烫金大字，字体刚劲有力。门柱为浅灰色花岗岩材质，表面攀附着多年生的常青藤（春季会长出新绿）。校门正对一条宽阔的上坡林荫道，两侧遍植樱花树。门后远处可见红砖建筑群，校门正面的视野尽头是碧蓝的海岸线。告示牌固定于校门右侧，用于发布公告。整个正门区域由石板铺装，是学生日常出入和集合的主要地点。","starterGold":500,"_app":"心隅","_author":"心隅官方","_version":"1.0","_exportedAt":"2026-04-21T00:00:00.000Z"}</script>
</svg>