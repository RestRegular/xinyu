<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心隅 — 管理大厅</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- ==================== 管理大厅 ==================== -->
<div class="topbar">
    <div class="topbar-left">
        <span class="topbar-brand">心隅</span>
    </div>
    <div class="topbar-center">
        <input class="input" style="width:240px;" placeholder="搜索存档..." id="lobbySearch" oninput="renderLobby()">
    </div>
    <div class="topbar-right">
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='settings.html'">⚙ 设置</button>
    </div>
</div>
<div class="lobby-tabs" id="lobbyTabs">
    <button class="lobby-tab active" data-filter="all" onclick="setFilter('all',this)">全部存档</button>
    <button class="lobby-tab" data-filter="奇幻" onclick="setFilter('奇幻',this)">奇幻</button>
    <button class="lobby-tab" data-filter="科幻" onclick="setFilter('科幻',this)">科幻</button>
    <button class="lobby-tab" data-filter="武侠" onclick="setFilter('武侠',this)">武侠</button>
    <button class="lobby-tab" data-filter="末日" onclick="setFilter('末日',this)">末日</button>
    <button class="lobby-tab" data-filter="自定义" onclick="setFilter('自定义',this)">自定义</button>
    <button class="lobby-tab" data-filter="archived" onclick="setFilter('archived',this)">已归档</button>
</div>
<div class="lobby-toolbar">
    <div class="lobby-toolbar-left">
        <span style="font-size:12px;color:var(--text-tertiary);" id="savesCount">0 个存档</span>
    </div>
    <div class="lobby-toolbar-right">
        <select class="settings-select" id="sortSelect" onchange="renderLobby()" style="font-size:12px;">
            <option value="lastSaved">最近保存</option>
            <option value="created">创建时间</option>
            <option value="name">名称</option>
            <option value="level">等级</option>
        </select>
    </div>
</div>
<div class="lobby-content" id="lobbyContent">
    <!-- 动态渲染 -->
</div>

<!-- ==================== 模态框：确认操作 ==================== -->
<div class="modal-overlay" id="modalConfirm">
    <div class="modal" style="max-width:400px;">
        <div class="modal-header">
            <h3 id="confirmTitle">确认</h3>
            <button class="btn btn-ghost btn-sm" onclick="closeModal('modalConfirm')">✕</button>
        </div>
        <div class="modal-body">
            <p id="confirmMessage" style="font-size:14px;color:var(--text-secondary);"></p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('modalConfirm')">取消</button>
            <button class="btn btn-danger" id="confirmAction" onclick="">确认</button>
        </div>
    </div>
</div>

<!-- ==================== 模态框：重命名 ==================== -->
<div class="modal-overlay" id="modalRename">
    <div class="modal" style="max-width:400px;">
        <div class="modal-header">
            <h3>重命名存档</h3>
            <button class="btn btn-ghost btn-sm" onclick="closeModal('modalRename')">✕</button>
        </div>
        <div class="modal-body">
            <input class="input" id="renameInput" placeholder="输入新名称...">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('modalRename')">取消</button>
            <button class="btn btn-primary" id="renameAction">确认</button>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/router.js"></script>
<script src="../js/lobby.js"></script>
<script src="../js/newgame.js"></script>
<script src="../js/app-lobby.js"></script>
</body>
</html>
