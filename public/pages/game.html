<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心隅 — 游戏</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- ==================== 游戏界面 ==================== -->
<div class="topbar">
    <div class="topbar-left">
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='lobby.html'">← 大厅</button>
        <span style="font-size:13px;font-weight:500;" id="gameTopbarName"></span>
        <span style="font-size:12px;color:var(--text-tertiary);" id="gameTopbarTurn"></span>
    </div>
    <div class="topbar-right">
        <button class="btn btn-ghost btn-sm" onclick="manualSave()" id="btnSave">保存</button>
        <div class="dropdown">
            <button class="btn btn-ghost btn-sm" onclick="toggleDropdown('gameMenu')">菜单 ▼</button>
            <div class="dropdown-menu" id="gameMenu">
                <button class="dropdown-item" onclick="manualSave();closeDropdowns()">💾 保存游戏</button>
                <button class="dropdown-item" onclick="localStorage.setItem('xinyu_active_save_id',currentSaveId);window.location.href='stats.html';closeDropdowns()">📊 游戏统计</button>
                <button class="dropdown-item" onclick="showWorldInfo();closeDropdowns()">🌍 世界信息</button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" onclick="exportCurrentSave();closeDropdowns()">📤 导出存档</button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item danger" onclick="window.location.href='lobby.html';closeDropdowns()">🚪 返回大厅</button>
            </div>
        </div>
    </div>
</div>
<div class="game-container">
    <!-- 左侧栏 -->
    <div class="game-sidebar" id="gameSidebar">
        <div class="sidebar-section">
            <div class="sidebar-section-title">角色</div>
            <div class="sidebar-char-name" id="sidebarCharName">—</div>
            <div class="sidebar-char-level" id="sidebarCharLevel">—</div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">位置</div>
            <div class="sidebar-location-name" id="sidebarLocation">—</div>
            <div class="sidebar-connections" id="sidebarConnections"></div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">快捷操作</div>
            <div class="sidebar-shortcuts">
                <button class="sidebar-shortcut" onclick="toggleRightPanel('attributes')">📊 属性面板</button>
                <button class="sidebar-shortcut" onclick="toggleRightPanel('inventory')">🎒 背包</button>
                <button class="sidebar-shortcut" onclick="toggleRightPanel('map')">🗺️ 地图</button>
            </div>
        </div>
    </div>

    <!-- 主对话区域 -->
    <div class="game-main">
        <div class="game-messages" id="gameMessages"></div>
        <div class="game-input-area">
            <div class="game-input-wrapper">
                <textarea class="game-input" id="gameInput" placeholder="描述你的行动..." rows="1"
                    onkeydown="handleInputKeydown(event)" oninput="autoResize(this)"></textarea>
                <button class="game-send-btn" id="gameSendBtn" onclick="sendMessage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 右侧面板 -->
    <div class="game-rightpanel" id="gameRightpanel">
        <div class="rightpanel-section" id="panelAttributes">
            <div class="sidebar-section-title">属性</div>
            <div id="attributesPanel"></div>
        </div>
        <div class="rightpanel-section" id="panelStatus">
            <div class="sidebar-section-title">状态效果</div>
            <div class="status-tags" id="statusPanel">
                <span style="font-size:12px;color:var(--text-tertiary);">无</span>
            </div>
        </div>
        <div class="rightpanel-section" id="panelInventory">
            <div class="sidebar-section-title">背包 <span id="inventoryCount" style="color:var(--text-tertiary);font-weight:400;"></span></div>
            <div class="inventory-list" id="inventoryPanel"></div>
        </div>
        <div class="rightpanel-section" id="panelMap">
            <div class="sidebar-section-title">地图</div>
            <div id="mapPanel"></div>
        </div>
        <div class="rightpanel-section" id="panelCharacters">
            <div class="sidebar-section-title">重要角色</div>
            <div id="charactersPanel">
                <span style="font-size:12px;color:var(--text-tertiary);">暂无</span>
            </div>
        </div>
    </div>
</div>

<!-- ==================== 模态框：确认操作 ==================== -->
<div class="modal-overlay" id="modalConfirm">
    <div class="modal" style="max-width:400px;">
        <div class="modal-header">
            <h3 id="confirmTitle">确认</h3>
            <button class="btn btn-ghost btn-sm" onclick="closeModal('modalConfirm')">✕</button>
        </div>
        <div class="modal-body">
            <p id="confirmMessage" style="font-size:14px;color:var(--text-secondary);"></p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('modalConfirm')">取消</button>
            <button class="btn btn-danger" id="confirmAction" onclick="">确认</button>
        </div>
    </div>
</div>

<!-- ==================== 模态框：世界信息 ==================== -->
<div class="modal-overlay" id="modalWorldInfo">
    <div class="modal" style="max-width:500px;">
        <div class="modal-header">
            <h3>世界信息</h3>
            <button class="btn btn-ghost btn-sm" onclick="closeModal('modalWorldInfo')">✕</button>
        </div>
        <div class="modal-body" id="worldInfoContent"></div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/router.js"></script>
<script src="../js/game.js"></script>
<script src="../js/api.js"></script>
<script src="../js/stats.js"></script>
<script src="../js/app-game.js"></script>
</body>
</html>
